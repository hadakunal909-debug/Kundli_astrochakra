name: Deploy to cPanel

# Push to main  ->  build the standalone bundle on GitHub  ->  rsync it to cPanel
# over SSH  ->  restart the Passenger Node app. The build always runs (so every
# push is validated); the deploy steps only run once the cPanel secrets exist.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build cPanel bundle
        run: npm run build:cpanel

      # secrets can't be read inside an `if:`, so compute a gate flag here.
      - name: Check cPanel secrets are configured
        id: gate
        run: |
          if [ -n "${{ secrets.CPANEL_SSH_HOST }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::cPanel secrets not set yet — skipping deploy. Build succeeded."
          fi

      - name: Set up SSH
        if: steps.gate.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          PORT="${{ secrets.CPANEL_SSH_PORT }}"
          ssh-keyscan -p "${PORT:-22}" -H "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync bundle to cPanel
        if: steps.gate.outputs.ready == 'true'
        run: |
          PORT="${{ secrets.CPANEL_SSH_PORT }}"
          rsync -az --delete \
            --exclude='.htaccess' --exclude='tmp/' --exclude='.well-known/' \
            -e "ssh -i ~/.ssh/id_deploy -p ${PORT:-22}" \
            web/.next/standalone/ \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_APP_PATH }}/"

      - name: Restart Passenger app
        if: steps.gate.outputs.ready == 'true'
        run: |
          PORT="${{ secrets.CPANEL_SSH_PORT }}"
          ssh -i ~/.ssh/id_deploy -p "${PORT:-22}" \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}" \
            "mkdir -p '${{ secrets.CPANEL_APP_PATH }}/tmp' && touch '${{ secrets.CPANEL_APP_PATH }}/tmp/restart.txt'"
