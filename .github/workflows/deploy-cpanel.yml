name: Deploy to cPanel

# Push to main -> build the self-contained standalone bundle on GitHub -> upload it to
# cPanel over FTP (this host's SFTP caps sessions and drops connections, so FTP is used
# instead). The build always runs (so every push is validated); deploy runs once the FTP
# secrets exist. Going live still needs a manual cPanel restart (Passenger ignores
# tmp/restart.txt on this host).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build cPanel bundle
        run: npm run build:cpanel

      # Passenger restart trigger (uploaded for when auto-restart is wired up later).
      - name: Stamp restart trigger
        run: |
          mkdir -p web/.next/standalone/tmp
          date -u +%s > web/.next/standalone/tmp/restart.txt

      # secrets can't be read inside an `if:`, so compute a gate flag here.
      - name: Check FTP secrets are configured
        id: gate
        run: |
          if [ -n "${{ secrets.FTP_SERVER }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FTP secrets not set yet — skipping deploy. Build succeeded."
          fi

      - name: Deploy via FTP
        if: steps.gate.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ secrets.FTP_PROTOCOL || 'ftp' }}
          port: ${{ secrets.FTP_PORT || '21' }}
          # The self-contained bundle (server + node_modules + .next/static + public).
          local-dir: ./web/.next/standalone/
          # App root relative to the FTP login home. With a dedicated FTP account scoped to
          # the app folder this is "/"; with the main account it's "kundli.astrochakra.co/".
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # IMPORTANT: do NOT use the action's default node_modules exclusion — the
          # standalone bundle's node_modules is required at runtime.
          exclude: |
            **/.git*
            **/.git*/**
            **/.next/cache/**

      - name: Check live site (restart is manual on this host)
        if: steps.gate.outputs.ready == 'true'
        env:
          APP_URL: ${{ secrets.CPANEL_APP_URL }}
        run: |
          URL="${APP_URL:-https://kundli.astrochakra.co}"
          PAYLOAD='{"name":"CI","date":"1990-01-01","time":"12:00","place":{"lat":28.6,"lon":77.2,"label":"D"}}'
          sleep 8
          body=$(curl -s --max-time 30 -X POST "$URL/api/kundli" -H "Content-Type: application/json" -d "$PAYLOAD" || true)
          vc=$(printf '%s' "$body" | grep -o '"d[0-9]\{1,2\}":' | sort -u | wc -l)
          if printf '%s' "$body" | grep -q '"specialLagnas"' && [ "$vc" -ge 60 ]; then
            echo "✓ Upload complete and the live site already reflects this build ($vc divisional charts)."
          else
            echo "::warning::Upload complete, but the live site still shows the previous build ($vc charts). Restart the app to publish: cPanel → Setup Node.js App → Restart."
          fi
