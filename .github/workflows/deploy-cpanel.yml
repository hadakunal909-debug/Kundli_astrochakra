name: Deploy to cPanel

# Push to main -> build the standalone bundle on GitHub -> upload it to cPanel
# over SFTP (works even when shell access is disabled) -> restart the Passenger
# Node app by refreshing tmp/restart.txt. The build always runs (so every push is
# validated); the deploy steps only run once the cPanel secrets exist.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build cPanel bundle
        run: npm run build:cpanel

      # Passenger restarts the app whenever tmp/restart.txt changes. Stamp it so
      # every deploy triggers a restart after the files land.
      - name: Stamp restart trigger
        run: |
          mkdir -p web/.next/standalone/tmp
          date -u +%s > web/.next/standalone/tmp/restart.txt

      # secrets can't be read inside an `if:`, so compute a gate flag here.
      - name: Check cPanel secrets are configured
        id: gate
        run: |
          if [ -n "${{ secrets.CPANEL_SSH_HOST }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::cPanel secrets not set yet — skipping deploy. Build succeeded."
          fi

      - name: Install lftp
        if: steps.gate.outputs.ready == 'true'
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Write SSH key
        if: steps.gate.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Deploy over SFTP
        if: steps.gate.outputs.ready == 'true'
        env:
          HOST: ${{ secrets.CPANEL_SSH_HOST }}
          USER: ${{ secrets.CPANEL_SSH_USER }}
          PORT: ${{ secrets.CPANEL_SSH_PORT }}
          APP: ${{ secrets.CPANEL_APP_PATH }}
        run: |
          PORT="${PORT:-22}"
          SSH="ssh -a -x -i $HOME/.ssh/id_deploy -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          lftp -c "
            set sftp:connect-program \"$SSH\";
            set net:max-retries 2;
            set net:timeout 25;
            set mirror:parallel-transfer-count 4;
            open -u \"$USER,x\" sftp://$HOST;
            # node_modules: large but immutable per version — skip unchanged by size.
            mirror -R --ignore-time --no-perms \
              web/.next/standalone/node_modules \"$APP/node_modules\";
            # everything else (app code, build output, package.json, restart trigger):
            # small, always refreshed so server code is never stale.
            mirror -R --no-perms -X node_modules/ \
              web/.next/standalone/ \"$APP/\";
            bye
          "
