name: Deploy to cPanel

# Push to main -> build the standalone bundle on GitHub -> upload it to cPanel
# over SFTP (works even when shell access is disabled) -> restart the Passenger
# Node app by refreshing tmp/restart.txt -> verify the new code is actually live.
# The build always runs (so every push is validated); the deploy steps only run
# once the cPanel secrets exist.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-cpanel
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build cPanel bundle
        run: npm run build:cpanel

      # Passenger restarts the app whenever tmp/restart.txt changes. Stamp it so
      # every deploy triggers a restart after the files land.
      - name: Stamp restart trigger
        run: |
          mkdir -p web/.next/standalone/tmp
          date -u +%s > web/.next/standalone/tmp/restart.txt

      # secrets can't be read inside an `if:`, so compute a gate flag here.
      - name: Check cPanel secrets are configured
        id: gate
        run: |
          if [ -n "${{ secrets.CPANEL_SSH_HOST }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::cPanel secrets not set yet — skipping deploy. Build succeeded."
          fi

      - name: Install lftp
        if: steps.gate.outputs.ready == 'true'
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Write SSH key
        if: steps.gate.outputs.ready == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Deploy over SFTP
        if: steps.gate.outputs.ready == 'true'
        env:
          HOST: ${{ secrets.CPANEL_SSH_HOST }}
          USER: ${{ secrets.CPANEL_SSH_USER }}
          PORT: ${{ secrets.CPANEL_SSH_PORT }}
          APP: ${{ secrets.CPANEL_APP_PATH }}
        run: |
          PORT="${PORT:-22}"
          SSH="ssh -a -x -i $HOME/.ssh/id_deploy -p $PORT -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          # cmd:fail-exit makes lftp exit non-zero on ANY failed command, so a broken
          # connection or transfer turns the job red instead of passing silently.
          # Shared cPanel caps concurrent SSH sessions, so parallel SFTP channels fail
          # with "subsystem request failed on channel 0". Use ONE sequential connection.
          lftp -c "
            set cmd:fail-exit yes;
            set sftp:auto-confirm yes;
            set sftp:connect-program \"$SSH\";
            set net:connection-limit 1;
            set net:max-retries 5;
            set net:reconnect-interval-base 5;
            set net:timeout 30;
            set mirror:parallel-transfer-count 1;
            set mirror:use-pget-n 1;
            open -u \"$USER,x\" sftp://$HOST;
            mkdir -f \"$APP/tmp\";
            mkdir -f \"$APP/web\";
            # 3rd-party deps: large but stable — skip unchanged by size.
            mirror -R --ignore-time --no-perms web/.next/standalone/node_modules \"$APP/node_modules\";
            # our calculation library changes every deploy — force an exact match.
            mirror -R --delete --no-perms web/.next/standalone/node_modules/@prisri \"$APP/node_modules/@prisri\";
            # Next.js build output — force fresh (it is pure build output; safe to mirror-delete).
            mirror -R --delete --no-perms -X cache/ web/.next/standalone/web/.next \"$APP/web/.next\";
            mirror -R --no-perms web/.next/standalone/web/public \"$APP/web/public\";
            put -O \"$APP/web\" web/.next/standalone/web/server.js;
            put -O \"$APP/web\" web/.next/standalone/web/package.json;
            put -O \"$APP\" web/.next/standalone/package.json;
            put -O \"$APP/tmp\" web/.next/standalone/tmp/restart.txt;
            bye
          "

      # Upload succeeded above. This host's Passenger does NOT honor tmp/restart.txt, so
      # going live needs a manual restart (cPanel → Setup Node.js App → Restart). This
      # step never fails the run — it just reports whether the live site already reflects
      # the new build, and reminds you to restart if not.
      - name: Check live site (restart is manual on this host)
        if: steps.gate.outputs.ready == 'true'
        env:
          APP_URL: ${{ secrets.CPANEL_APP_URL }}
        run: |
          URL="${APP_URL:-https://kundli.astrochakra.co}"
          PAYLOAD='{"name":"CI","date":"1990-01-01","time":"12:00","place":{"lat":28.6,"lon":77.2,"label":"D"}}'
          sleep 8
          body=$(curl -s --max-time 30 -X POST "$URL/api/kundli" -H "Content-Type: application/json" -d "$PAYLOAD" || true)
          vc=$(printf '%s' "$body" | grep -o '"d[0-9]\{1,2\}":' | sort -u | wc -l)
          if printf '%s' "$body" | grep -q '"specialLagnas"' && [ "$vc" -ge 60 ]; then
            echo "✓ Upload complete and the live site already reflects this build ($vc divisional charts)."
          else
            echo "::warning::Upload complete, but the live site still shows the previous build ($vc charts). Restart the app to publish: cPanel → Setup Node.js App → Restart."
          fi
